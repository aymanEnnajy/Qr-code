<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ayman Ennajy - Full Stack Developer</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-light: #f8fafc;
      --card-dark: #151515;
      --card-light: #ffffff;
      --text-dark: #0f172a;
      --text-light: #e2e8f0;
      --accent: #0ea5e9;
      --radius: 20px;
      --transition: all 0.35s ease;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      transition: var(--transition);
    }

    body.light-mode {
      background: var(--bg-light);
      color: var(--text-dark);
    }

    .profile-container {
      text-align:center;
      max-width:500px;
      width:100%;
      position:relative;
    }

    .profile-image {
      width:130px;
      height:130px;
      border-radius:50%;
      overflow:hidden;
      margin:auto;
      border:4px solid var(--accent);
    }

    .profile-image img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .name {
      font-size:2.2rem;
      margin-top:15px;
    }

    .title {
      margin-bottom:25px;
      color:#94a3b8;
    }

    .action-card {
      display:flex;
      align-items:center;
      padding:15px;
      margin:10px 0;
      border-radius:15px;
      text-decoration:none;
      background:var(--card-dark);
      color:var(--text-light);
      transition:0.3s;
    }

    .light-mode .action-card {
      background:var(--card-light);
      color:var(--text-dark);
    }

    .action-card i {
      margin-right:10px;
    }

    .action-card:hover {
      transform:translateY(-5px);
    }

    /* Buttons */
    .theme-toggle-btn, .lang-toggle-btn {
      position:absolute;
      top:20px;
      width:45px;
      height:45px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      font-size:1.2rem;
    }

    .theme-toggle-btn {
      right:20px;
    }

    .lang-toggle-btn {
      left:20px;
    }

  </style>
</head>

<body>

<!-- Language Button -->
<button class="lang-toggle-btn" id="langToggle">EN</button>

<!-- Theme Button -->
<button class="theme-toggle-btn" id="themeToggle">
  <i class="fas fa-moon"></i>
</button>

<div class="profile-container">

  <div class="profile-image">
    <img src="1764955062357.jpg">
  </div>

  <h1 class="name">Ennajy Mohamed Ayman</h1>
  <p class="title" id="title">Développeur Web Full-Stack</p>

  <a href="https://ennajy-mohamed-ayman.vercel.app/" class="action-card">
    <i class="fas fa-briefcase"></i>
    <span id="portfolioText">Voir mon portfolio</span>
  </a>

  <a href="https://www.linkedin.com/in/mohamed-ayman-ennajy-1689a0258/" class="action-card">
    <i class="fa-brands fa-linkedin"></i>
    <span id="linkedinText">Mon LinkedIn</span>
  </a>

  <a href="#" id="cvLink" class="action-card" target="_blank">
    <i class="fas fa-file-pdf"></i>
    <span id="cvText">Télécharger mon CV</span>
  </a>

</div>

<script>
/* ================= THEME ================= */
const body = document.body;
const themeBtn = document.getElementById('themeToggle');
const icon = themeBtn.querySelector('i');

if(localStorage.getItem('theme') === 'light'){
  body.classList.add('light-mode');
  icon.classList.replace('fa-moon','fa-sun');
}

themeBtn.onclick = () => {
  body.classList.toggle('light-mode');
  const isLight = body.classList.contains('light-mode');
  icon.classList.toggle('fa-sun');
  icon.classList.toggle('fa-moon');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

/* ================= LANGUAGE ================= */
const langBtn = document.getElementById('langToggle');

const texts = {
  fr: {
    title: "Développeur Web Full-Stack",
    portfolio: "Voir mon portfolio",
    linkedin: "Mon LinkedIn",
    cv: "Télécharger mon CV",
    cvLink: "https://aymanennajy.github.io/Qr-code/Ennajy_Mohamed_Ayman.pdf"
  },
  en: {
    title: "Full Stack Web Developer",
    portfolio: "View my portfolio",
    linkedin: "My LinkedIn",
    cv: "Download my CV",
    cvLink: "https://aymanennajy.github.io/Qr-code/Ennajy_Mohamed_Ayman_EN.pdf"
  }
};

let currentLang = localStorage.getItem('lang') || 'fr';

function updateLang(lang){
  document.getElementById('title').innerText = texts[lang].title;
  document.getElementById('portfolioText').innerText = texts[lang].portfolio;
  document.getElementById('linkedinText').innerText = texts[lang].linkedin;
  document.getElementById('cvText').innerText = texts[lang].cv;
  document.getElementById('cvLink').href = texts[lang].cvLink;

  langBtn.innerText = lang === 'fr' ? 'EN' : 'FR';
  localStorage.setItem('lang', lang);
}

updateLang(currentLang);

langBtn.onclick = () => {
  currentLang = currentLang === 'fr' ? 'en' : 'fr';
  updateLang(currentLang);
};
</script>

</body>
</html>
